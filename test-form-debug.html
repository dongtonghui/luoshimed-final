<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表单提交测试 - 调试版</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 12px 24px; background: #2563EB; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #1d4ed8; }
    #log { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .error { color: #ef4444; }
    .success { color: #10b981; }
    .info { color: #3b82f6; }
  </style>
</head>
<body>
  <h1>表单提交测试 - 调试版</h1>
  
  <div class="form-group">
    <label>姓名 *</label>
    <input type="text" id="name" value="测试用户" />
  </div>
  
  <div class="form-group">
    <label>电话 *</label>
    <input type="tel" id="phone" value="13800138000" />
  </div>
  
  <div class="form-group">
    <label>公司</label>
    <input type="text" id="company" value="测试公司" />
  </div>
  
  <div class="form-group">
    <label>咨询类型</label>
    <select id="type">
      <option value="产品采购咨询">产品采购咨询</option>
      <option value="诊所合作开店">诊所合作开店</option>
    </select>
  </div>
  
  <div class="form-group">
    <label>留言</label>
    <textarea id="message" rows="3">这是一条测试消息</textarea>
  </div>
  
  <button onclick="submitForm()">提交表单</button>
  <button onclick="testGet()" style="margin-left: 10px; background: #6b7280;">测试GET请求</button>
  <button onclick="clearLog()" style="margin-left: 10px; background: #6b7280;">清空日志</button>
  
  <div id="log"></div>

  <script>
    const FORM_CONFIG = {
      SUBMIT_URL: 'https://script.google.com/macros/s/AKfycby2hOTOv43n4C6p8aNZrUioS2Qfb1MR5QAfX2OW44TSeysOXr7f4yCklCSEx15PvKYAeg/exec'
    };
    
    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
      logEl.innerHTML += `<div class="${className}">[${time}] ${msg}</div>`;
      console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }
    
    async function testGet() {
      log('测试GET请求...', 'info');
      try {
        const response = await fetch(FORM_CONFIG.SUBMIT_URL, {
          method: 'GET',
          mode: 'cors'
        });
        log('GET响应状态: ' + response.status, 'info');
        const text = await response.text();
        log('GET响应内容: ' + text, 'success');
      } catch (error) {
        log('GET请求失败: ' + error.message, 'error');
        log('错误详情: ' + error.name, 'error');
      }
    }
    
    async function submitForm() {
      log('开始提交表单...', 'info');
      
      const submitData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        company: document.getElementById('company').value,
        type: document.getElementById('type').value,
        message: document.getElementById('message').value,
        source: '测试页面'
      };
      
      log('提交数据: ' + JSON.stringify(submitData), 'info');
      log('请求URL: ' + FORM_CONFIG.SUBMIT_URL, 'info');
      
      try {
        log('发送fetch请求...', 'info');
        const response = await fetch(FORM_CONFIG.SUBMIT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(submitData),
          mode: 'cors'
        });
        
        log('收到响应，状态: ' + response.status, 'info');
        
        if (!response.ok) {
          throw new Error('HTTP错误: ' + response.status);
        }
        
        const result = await response.json();
        log('响应JSON: ' + JSON.stringify(result), 'info');
        
        if (result.success) {
          log('✓ 提交成功！', 'success');
        } else {
          log('✗ 提交失败: ' + result.error, 'error');
        }
      } catch (error) {
        log('✗ 请求失败: ' + error.message, 'error');
        log('错误名称: ' + error.name, 'error');
        log('错误堆栈: ' + error.stack, 'error');
        
        // 尝试用no-cors模式
        log('尝试用no-cors模式...', 'info');
        try {
          await fetch(FORM_CONFIG.SUBMIT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(submitData),
            mode: 'no-cors'
          });
          log('no-cors模式请求已发送（无法获取响应）', 'info');
        } catch (e) {
          log('no-cors模式也失败: ' + e.message, 'error');
        }
      }
    }
    
    // 页面加载时自动测试GET
    window.onload = function() {
      log('页面加载完成', 'info');
      log('脚本URL: ' + FORM_CONFIG.SUBMIT_URL, 'info');
    };
  </script>
</body>
</html>
